<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="60%" stop-color="#06b6d4" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background paper 3 (furthest back) -->
  <rect x="10" y="8" width="26" height="34" rx="2" fill="#94a3b8" transform="rotate(-8 23 25)" opacity="0.5"/>
  
  <!-- Background paper 2 -->
  <rect x="10" y="8" width="26" height="34" rx="2" fill="#b0bec5" transform="rotate(-4 23 25)" opacity="0.7"/>
  
  <!-- Front paper -->
  <rect x="10" y="8" width="26" height="34" rx="2" fill="url(#paperGrad)"/>
  <!-- Text lines on paper -->
  <line x1="14" y1="15" x2="32" y2="15" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="20" x2="30" y2="20" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="25" x2="32" y2="25" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="30" x2="26" y2="30" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="35" x2="29" y2="35" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Flowing arrow -->
  <path d="M 16 44 C 16 36, 30 32, 36 28 C 42 24, 48 20, 50 14" 
        stroke="url(#arrowGrad)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polygon points="48,10 54,14 50,18" fill="#a855f7"/>

  <!-- AI neural node burst -->
  <g filter="url(#glow)" transform="translate(50, 10)">
    <circle cx="0" cy="0" r="4" fill="#22d3ee"/>
    <circle cx="0" cy="0" r="2" fill="#ffffff"/>
    <!-- Radiating lines -->
    <line x1="0" y1="-4" x2="0" y2="-9" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="4" y1="0" x2="9" y2="0" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="0" y1="4" x2="0" y2="9" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-4" y1="0" x2="-9" y2="0" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="2.8" y1="-2.8" x2="6.4" y2="-6.4" stroke="#22d3ee" stroke-width="1" stroke-linecap="round"/>
    <line x1="2.8" y1="2.8" x2="6.4" y2="6.4" stroke="#22d3ee" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2.8" y1="2.8" x2="-6.4" y2="6.4" stroke="#22d3ee" stroke-width="1" stroke-linecap="round"/>
    <line x1="-2.8" y1="-2.8" x2="-6.4" y2="-6.4" stroke="#22d3ee" stroke-width="1" stroke-linecap="round"/>
    <!-- Small dots at ends -->
    <circle cx="0" cy="-9" r="1.2" fill="#22d3ee"/>
    <circle cx="9" cy="0" r="1.2" fill="#22d3ee"/>
    <circle cx="0" cy="9" r="1.2" fill="#22d3ee"/>
    <circle cx="-9" cy="0" r="1.2" fill="#22d3ee"/>
    <circle cx="6.4" cy="-6.4" r="1" fill="#06b6d4"/>
    <circle cx="6.4" cy="6.4" r="1" fill="#06b6d4"/>
    <circle cx="-6.4" cy="6.4" r="1" fill="#06b6d4"/>
    <circle cx="-6.4" cy="-6.4" r="1" fill="#06b6d4"/>
  </g>
</svg>