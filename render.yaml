services:
  - type: web
    name: researchflow-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false # Set this in the Render Dashboard
      - key: PAPERS_DIR
        value: ./data/papers
      - key: VECTOR_DB_DIR
        value: ./data/vector_db
      - key: METADATA_DIR
        value: ./data/metadata
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: web
    name: researchflow-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://researchflow-backend.onrender.com
